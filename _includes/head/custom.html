{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* --- 1. PUBLICATION ZOOM --- */
  article.archive__item .archive__item-teaser {
    overflow: hidden !important;
    border-radius: 12px !important;
    border: 1px solid #eee !important;
  }
  article.archive__item:hover .archive__item-teaser img {
    transform: scale(1.3) !important;
    transition: 0.5s all ease-in-out !important;
  }
  article.archive__item:hover .archive__item-teaser {
    box-shadow: 0 10px 25px rgba(0,0,0,0.15) !important;
    transform: translateY(-5px) !important;
  }

  /* --- 2. TEXT & HEADERS (Homepage) --- */
  .page__content {
    line-height: 1.8 !important;
    font-size: 1.1rem !important;
    color: #333 !important;
  }

  .page__content h2 {
    color: #2c3e50 !important;
    border-left: 6px solid #3498db !important;
    padding-left: 15px !important;
    margin-top: 40px !important;
  }

  /* --- 3. TEACHING & RESEARCH CARDS --- */
  /* This targets lists only in the main content area */
  .page__content ul li {
    list-style: none !important;
    background: #f8f9fa !important;
    margin-bottom: 12px !important;
    padding: 15px 20px !important;
    border-radius: 10px !important;
    border: 1px solid #e9ecef !important;
    border-left: 5px solid #3498db !important; 
    transition: 0.3s all ease !important;
    display: block !important;
  }

  .page__content ul li:hover {
    background: #ffffff !important;
    border-color: #3498db !important;
    transform: translateX(10px) !important;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.05) !important;
  }

  /* Highlight bold words in blue */
  .page__content strong {
    color: #2980b9 !important;
  }
</style>
