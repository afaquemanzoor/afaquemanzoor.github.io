{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* 1. The Container: Handles rounded corners and clips the zooming image */
  .archive__item-teaser {
    overflow: hidden !important;
    border-radius: 12px !important; 
    display: block !important;
    position: relative !important;
    transform: translateZ(0); /* Fixes Safari flicker/aliasing */
    transition: all 0.3s ease-in-out !important;
    border: 1px solid #eee !important;
  }

  /* 2. The Image: Default State */
  .archive__item-teaser img {
    /* cubic-bezier makes the zoom feel more "premium" and organic */
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
    display: block !important;
    width: 100% !important;
    height: auto !important;
    filter: brightness(0.98);
  }

  /* 3. The Hover Effect: Zoom the image 22% */
  .archive__item:hover .archive__item-teaser img {
    transform: scale(1.22) !important; 
    filter: brightness(1.05);
  }

  /* 4. The "Card" Lift: Moves the image box up slightly for 3D effect */
  .archive__item:hover .archive__item-teaser {
    box-shadow: 0 15px 35px rgba(0,0,0,0.18) !important;
    transform: translateY(-5px) !important;
    border-color: #ccc !important;
  }

  /* Optional: Smoothly underline the title on hover */
  .archive__item:hover .archive__item-title {
    text-decoration: underline !important;
    text-underline-offset: 4px;
  }
</style>
