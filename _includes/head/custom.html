{% include base_path %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  /* FORCED OVERRIDE - Using 'article' to ensure we beat the theme's CSS */
  
  article .archive__item-teaser {
    overflow: hidden !important;
    border-radius: 20px !important; /* Made even more round to 'see' the update */
    display: block !important;
    border: 2px solid #494E52 !important; /* Darker border to prove it loaded */
    transition: all 0.4s ease !important;
  }

  article .archive__item-teaser img {
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
    display: block !important;
    width: 100% !important;
    transform: scale(1) !important;
  }

  /* Trigger on the link or the article hover */
  article.archive__item:hover .archive__item-teaser img,
  article.archive__item:hover img {
    transform: scale(1.5) !important; /* High zoom for visibility */
  }

  article.archive__item:hover .archive__item-teaser {
    box-shadow: 0 15px 35px rgba(0,0,0,0.3) !important;
    transform: translateY(-8px) !important;
  }
</style>
